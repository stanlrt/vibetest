[project]
name = "vibetest"
version = "0.1.0"
description = "A short description of my project."
requires-python = ">=3.13"
dependencies = [
    "browser-use==0.9.5",
    "langchain-google-genai",
    "python-dotenv",
    "pydantic",
    "pydantic-settings",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vibetest"]