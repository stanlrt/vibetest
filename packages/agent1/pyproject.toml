[project]
name = "agent1"
version = "0.1.0"
description = "Agent 1 implementation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["shared", "python-dotenv>=1.0.1"]

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent1"]
