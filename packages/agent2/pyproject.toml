[project]
name = "agent2"
version = "0.1.0"
description = "Agent 2 implementation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "browser-use==0.9.5",
    "langchain-google-genai",
    "python-dotenv",
    "pydantic",
    "pydantic-settings",
]

[project.scripts]
agent2 = "agent2.main:run"

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent2"]
