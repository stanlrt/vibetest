[project]
name = "vibetester"
version = "0.1.0"
description = "End-to-end UX testing: extract requirements from chat transcripts and test them in browser"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["agent1", "agent2", "shared"]

[project.scripts]
vibetester = "vibetester.main:run"

[tool.uv.sources]
agent1 = { workspace = true }
agent2 = { workspace = true }
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vibetester"]
