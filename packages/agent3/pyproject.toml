[project]
name = "agent3"
version = "0.1.0"
description = "Agent 3: Groups atomic test tasks into meaningful test results"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "dspy>=3.0.0",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent3"]
